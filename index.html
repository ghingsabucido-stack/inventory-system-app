<!DOCTYPE html>
<html>
<head>
  <title>Inventory System</title>
</head>
<body>

  <h1>Inventory System</h1>

  <input id="name" placeholder="Product Name">
  <input id="stock" placeholder="Stock">
  <input id="shop" placeholder="Shop">
  <button onclick="addProduct()">Add</button>

  <h2>Products (<span id="count">0</span>)</h2>
  <ul id="list"></ul>

<script>
const API = "https://inventory-system-app-production-b805.up.railway.app";


// LOAD PRODUCTS
async function loadProducts() {
  try {
    const res = await fetch(API + "/api/products");
    const data = await res.json();

    document.getElementById("count").innerText = data.length;

    document.getElementById("list").innerHTML =
      data.map(p =>
        `<li>${p.name} - ${p.stock} (${p.shop})</li>`
      ).join("");

  } catch (err) {
    console.error("Error loading products:", err);
    document.getElementById("list").innerHTML =
      "<li>Failed to load products</li>";
  }
}


// ADD PRODUCT
async function addProduct() {
  const name = document.getElementById("name").value.trim();
  const stock = document.getElementById("stock").value.trim();
  const shop = document.getElementById("shop").value.trim();

  if (!name || !stock || !shop) {
    alert("Please fill all fields!");
    return;
  }

  await fetch(API + "/api/products", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, stock, shop })
  });

  // refresh list
  loadProducts();

  // clear inputs
  document.getElementById("name").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("shop").value = "";
}


// initial load
loadProducts();
</script>

</body>
</html>
